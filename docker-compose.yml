services:
  postgres:
    image: postgres:16
    container_name: finance_postgres
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
    ports:
      - "5432:5432"
    volumes:
      - finance_pg_data:/var/lib/postgresql/data

volumes:
  finance_pg_data: